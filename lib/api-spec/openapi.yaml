openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Mini Wallet System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: wallet
    description: Wallet operations
  - name: transfers
    description: Transfer operations
  - name: transactions
    description: Transaction history
  - name: ledger
    description: Ledger entries
  - name: notifications
    description: Notification operations
  - name: admin
    description: Admin dashboard operations
  - name: simulation
    description: Failure simulation for demos

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /wallet/balance:
    get:
      operationId: getBalance
      tags: [wallet]
      summary: Get wallet balance for current user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Wallet balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletBalance"

  /wallet/add-money:
    post:
      operationId: addMoney
      tags: [wallet]
      summary: Add money to wallet
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMoneyBody"
      responses:
        "200":
          description: Money added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResult"

  /wallet/withdraw:
    post:
      operationId: withdrawMoney
      tags: [wallet]
      summary: Withdraw money from wallet
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawBody"
      responses:
        "200":
          description: Withdrawal successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResult"
        "400":
          description: Insufficient balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transfers/initiate:
    post:
      operationId: initiateTransfer
      tags: [transfers]
      summary: Initiate a wallet-to-wallet transfer
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferBody"
      responses:
        "202":
          description: Transfer initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Duplicate request (idempotency)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResult"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transfers/{transactionId}/status:
    get:
      operationId: getTransferStatus
      tags: [transfers]
      summary: Get transfer status by transaction ID
      security:
        - BearerAuth: []
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Transfer status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List transactions for current user
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [INITIATED, PROCESSING, SUCCESS, FAILED, PENDING, REVERSED]
      responses:
        "200":
          description: Transaction list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"

  /ledger:
    get:
      operationId: getLedger
      tags: [ledger]
      summary: Get ledger entries for current user
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Ledger entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerListResponse"

  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get notifications for current user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Notification list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"

  /notifications/{notificationId}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      security:
        - BearerAuth: []
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      security:
        - BearerAuth: []
      responses:
        "200":
          description: All marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin]
      summary: Get admin dashboard stats
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /admin/transactions:
    get:
      operationId: listAdminTransactions
      tags: [admin]
      summary: List all transactions (admin)
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [INITIATED, PROCESSING, SUCCESS, FAILED, PENDING, REVERSED]
      responses:
        "200":
          description: All transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTransactionListResponse"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all users with wallet balances (admin)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"

  /admin/fraud-alerts:
    get:
      operationId: getFraudAlerts
      tags: [admin]
      summary: Get fraud alert events
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Fraud alerts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FraudAlertListResponse"

  /admin/kafka-stats:
    get:
      operationId: getKafkaStats
      tags: [admin]
      summary: Get Kafka queue statistics
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Kafka stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KafkaStats"

  /admin/transaction-chart:
    get:
      operationId: getTransactionChart
      tags: [admin]
      summary: Get transaction volume chart data (last 7 days)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionChartResponse"

  /simulate/db-failure:
    post:
      operationId: simulateDbFailure
      tags: [simulation]
      summary: Simulate a database failure
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Simulation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationResult"

  /simulate/duplicate-payment:
    post:
      operationId: simulateDuplicatePayment
      tags: [simulation]
      summary: Simulate a duplicate payment (idempotency test)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DuplicatePaymentBody"
      responses:
        "200":
          description: Simulation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationResult"

  /simulate/notification-failure:
    post:
      operationId: simulateNotificationFailure
      tags: [simulation]
      summary: Simulate a notification service failure
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Simulation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationResult"

  /simulate/kafka-delay:
    post:
      operationId: simulateKafkaDelay
      tags: [simulation]
      summary: Simulate Kafka processing delay
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KafkaDelayBody"
      responses:
        "200":
          description: Simulation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationResult"

  /users/search:
    get:
      operationId: searchUsers
      tags: [auth]
      summary: Search users by email for transfers
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSearchResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    RegisterBody:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
      required: [name, email, password]

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required: [token, user]

    UserProfile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin]
        createdAt:
          type: string
          format: date-time
        walletId:
          type: string
      required: [id, name, email, role, createdAt]

    WalletBalance:
      type: object
      properties:
        walletId:
          type: string
        balance:
          type: number
        dailyTransferLimit:
          type: number
        dailyTransferUsed:
          type: number
        currency:
          type: string
      required: [walletId, balance, dailyTransferLimit, dailyTransferUsed, currency]

    AddMoneyBody:
      type: object
      properties:
        amount:
          type: number
          minimum: 1
        note:
          type: string
      required: [amount]

    WithdrawBody:
      type: object
      properties:
        amount:
          type: number
          minimum: 1
        note:
          type: string
      required: [amount]

    TransferBody:
      type: object
      properties:
        receiverEmail:
          type: string
          format: email
        amount:
          type: number
          minimum: 1
        note:
          type: string
        idempotencyKey:
          type: string
      required: [receiverEmail, amount]

    TransactionResult:
      type: object
      properties:
        transactionId:
          type: string
        status:
          type: string
          enum: [INITIATED, PROCESSING, SUCCESS, FAILED, PENDING, REVERSED]
        amount:
          type: number
        message:
          type: string
        idempotencyKey:
          type: string
        isDuplicate:
          type: boolean
      required: [transactionId, status, amount, message]

    Transaction:
      type: object
      properties:
        id:
          type: string
        senderId:
          type: string
        senderName:
          type: string
        senderEmail:
          type: string
        receiverId:
          type: string
        receiverName:
          type: string
        receiverEmail:
          type: string
        amount:
          type: number
        status:
          type: string
          enum: [INITIATED, PROCESSING, SUCCESS, FAILED, PENDING, REVERSED]
        type:
          type: string
          enum: [TRANSFER, ADD_MONEY, WITHDRAW, REFUND]
        note:
          type: string
        idempotencyKey:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, amount, status, type, createdAt, updatedAt]

    TransactionListResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [transactions, total, page, limit]

    LedgerEntry:
      type: object
      properties:
        id:
          type: string
        transactionId:
          type: string
        type:
          type: string
          enum: [CREDIT, DEBIT, REFUND, WITHDRAW]
        amount:
          type: number
        balanceAfter:
          type: number
        description:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [id, transactionId, type, amount, balanceAfter, timestamp]

    LedgerListResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LedgerEntry"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [entries, total, page, limit]

    Notification:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        message:
          type: string
        type:
          type: string
          enum: [EMAIL, SMS, IN_APP]
        status:
          type: string
          enum: [SENT, DELIVERED, FAILED, READ]
        createdAt:
          type: string
          format: date-time
      required: [id, userId, message, type, status, createdAt]

    NotificationListResponse:
      type: object
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        unreadCount:
          type: integer
      required: [notifications, unreadCount]

    AdminDashboard:
      type: object
      properties:
        totalTransactions:
          type: integer
        successfulTransactions:
          type: integer
        failedTransactions:
          type: integer
        pendingTransactions:
          type: integer
        reversedTransactions:
          type: integer
        totalWalletBalance:
          type: number
        activeUsers:
          type: integer
        totalUsers:
          type: integer
        fraudAlerts:
          type: integer
        totalVolume:
          type: number
        kafkaQueueBacklog:
          type: integer
        successRate:
          type: number
      required:
        [
          totalTransactions,
          successfulTransactions,
          failedTransactions,
          pendingTransactions,
          reversedTransactions,
          totalWalletBalance,
          activeUsers,
          totalUsers,
          fraudAlerts,
          totalVolume,
          kafkaQueueBacklog,
          successRate,
        ]

    AdminTransaction:
      type: object
      properties:
        id:
          type: string
        senderName:
          type: string
        senderEmail:
          type: string
        receiverName:
          type: string
        receiverEmail:
          type: string
        amount:
          type: number
        status:
          type: string
          enum: [INITIATED, PROCESSING, SUCCESS, FAILED, PENDING, REVERSED]
        type:
          type: string
          enum: [TRANSFER, ADD_MONEY, WITHDRAW, REFUND]
        isFlagged:
          type: boolean
        flagReason:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, amount, status, type, createdAt, isFlagged]

    AdminTransactionListResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/AdminTransaction"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [transactions, total, page, limit]

    AdminUser:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin]
        walletBalance:
          type: number
        totalTransactions:
          type: integer
        isFlagged:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, role, walletBalance, totalTransactions, isFlagged, createdAt]

    AdminUserListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/AdminUser"
        total:
          type: integer
      required: [users, total]

    FraudAlert:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        userName:
          type: string
        userEmail:
          type: string
        type:
          type: string
          enum: [RAPID_TRANSFERS, LARGE_TRANSACTION, MULTIPLE_FAILURES]
        description:
          type: string
        severity:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        transactionId:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, userId, type, description, severity, createdAt]

    FraudAlertListResponse:
      type: object
      properties:
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/FraudAlert"
        total:
          type: integer
      required: [alerts, total]

    KafkaStats:
      type: object
      properties:
        topics:
          type: array
          items:
            $ref: "#/components/schemas/KafkaTopic"
        totalMessages:
          type: integer
        processedMessages:
          type: integer
        pendingMessages:
          type: integer
        failedMessages:
          type: integer
      required: [topics, totalMessages, processedMessages, pendingMessages, failedMessages]

    KafkaTopic:
      type: object
      properties:
        name:
          type: string
        messageCount:
          type: integer
        pendingCount:
          type: integer
        processedCount:
          type: integer
      required: [name, messageCount, pendingCount, processedCount]

    TransactionChartData:
      type: object
      properties:
        date:
          type: string
        successful:
          type: integer
        failed:
          type: integer
        volume:
          type: number
      required: [date, successful, failed, volume]

    TransactionChartResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TransactionChartData"
      required: [data]

    SimulationResult:
      type: object
      properties:
        scenario:
          type: string
        description:
          type: string
        outcome:
          type: string
        steps:
          type: array
          items:
            type: string
        compensationApplied:
          type: boolean
      required: [scenario, description, outcome, steps]

    DuplicatePaymentBody:
      type: object
      properties:
        idempotencyKey:
          type: string
        amount:
          type: number
      required: [idempotencyKey, amount]

    KafkaDelayBody:
      type: object
      properties:
        delayMs:
          type: integer
          minimum: 100
          maximum: 10000
      required: [delayMs]

    UserSearchResult:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
      required: [id, name, email]

    UserSearchResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserSearchResult"
      required: [users]
